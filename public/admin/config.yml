# Sveltia CMS configuration for the Kiwissec site.
#
# Edits are committed to the PUBLIC repo (content is public-authoritative) on a
# dedicated `content` branch — NEVER straight to `main`. A GitHub Action then
# opens a `content` -> `main` PR so the full CI (Zod schema + content audit +
# Playwright) gates every change before it deploys. (Sveltia has no built-in
# editorial workflow yet, hence the branch + auto-PR pattern.)
#
# Each collection is stored one JSON file per entry under src/data/<collection>/
# (see src/content.config.ts). The filename is the entry `id` (slug).

backend:
  name: github
  repo: Kiwissec/kiwissec.github.io
  branch: content
  # OAuth token-exchange worker (authorization code flow): the deployed
  # sveltia-cms-auth Cloudflare Worker. If the worker is redeployed or moved,
  # update this URL (and the GitHub OAuth App callback) together.
  base_url: https://sveltia-cms-auth.kiwissec.workers.dev

# (Sveltia ignores Decap's `local_backend` and supports no proxy server; for
# local testing, open /admin/ in a Chromium browser and use the File System
# Access API "Work with Local Repository" flow against a local clone.)

# Global media library target for news images. Editors upload here; the news
# `img` field keeps the BARE filename (the site prepends the path), so it stays
# a plain string the content audit accepts.
media_folder: public/assets/news
public_folder: /assets/news

# 上傳即自動轉檔（Sveltia 內建 image optimizer，v0.68.0 起）：支援的 raster 圖
# （JPG/PNG/GIF/AVIF/WebP）在「瀏覽器端、commit 前」轉成 webp 並縮到最大邊
# 1600px，檔名主體不變、副檔名改 .webp。注意這不是保證——HEIC（iPhone 預設
# 格式）等不支援的格式、或繞過 CMS 直接 push 的檔案會原樣落地；「news 圖必為
# WebP」的不變量由 audit:content 的檢查（副檔名＋magic bytes）在 CI 強制，
# 維護指南也提醒編輯者先把 HEIC 轉存。
# max_file_size 套用在「轉檔後」的結果，擋的是轉不了檔或壓不下來的異常檔。
media_libraries:
  default:
    config:
      max_file_size: 512000
      transformations:
        raster_image:
          format: webp
          quality: 85
          width: 1600
          height: 1600
        svg:
          optimize: true

collections:
  - name: courses
    label: 課程
    label_singular: 課程
    folder: src/data/courses
    format: json
    extension: json
    identifier_field: id
    slug: "{{fields.id}}"
    create: true
    delete: true
    summary: "{{order}} · {{title}}"
    fields:
      - {
          name: id,
          label: 代號 (id),
          widget: string,
          hint: "唯一代號，英數與連字號，例如 aw-14；不可與其他課重複，會成為檔名",
        }
      - {
          name: order,
          label: 顯示順序（小的排前面）,
          widget: number,
          value_type: int,
          min: 0,
        }
      - name: cat
        label: 分類
        widget: select
        # 對應 src/data/course-cats.ts 的 COURSE_CAT_IDS（單一來源）。新增分類時先改
        # 該檔，這裡同步加一個 option；漂移會被 content.config.ts 的 Zod enum 在
        # build 時大聲攔下（不會靜默上線）。
        options:
          - { label: 資安意識, value: awareness }
          - { label: 攻防演練, value: offensive }
          - { label: 資安防護, value: defensive }
      - { name: title, label: 課程名稱, widget: string }
      - { name: tags, label: 標籤, widget: list, hint: "至少一個；逐項輸入" }
      - { name: desc, label: 課程簡介, widget: text }
      - {
          name: hours,
          label: 時數,
          widget: string,
          hint: "文字即可，例如 1~3 小時",
        }
      # 以下為課程內頁（點卡片後）的延伸內容，皆可留空；留空則內頁僅顯示摘要與洽詢按鈕。
      - {
          name: intro,
          label: 課程介紹,
          widget: text,
          required: false,
          hint: "內頁開頭的介紹段落；段落之間空一行即可分段",
        }
      - {
          name: outline,
          label: 課程大綱,
          widget: list,
          required: false,
          hint: "逐項輸入，內頁以編號清單呈現",
        }
      - { name: audience, label: 適用人員, widget: text, required: false }
      - {
          name: objectives,
          label: 課程目標,
          widget: list,
          required: false,
          hint: "逐項輸入，內頁以清單呈現",
        }

  - name: services
    label: 服務
    label_singular: 服務
    folder: src/data/services
    format: json
    extension: json
    identifier_field: id
    slug: "{{fields.id}}"
    create: true
    delete: true
    summary: "{{order}} · {{name}}"
    fields:
      - {
          name: id,
          label: 代號 (id),
          widget: string,
          hint: "唯一代號，例如 education；不可重複，會成為檔名",
        }
      - {
          name: order,
          label: 顯示順序（小的排前面）,
          widget: number,
          value_type: int,
          min: 0,
        }
      - {
          name: icon,
          label: 圖示 (Font Awesome),
          widget: string,
          hint: "Font Awesome class，例如 fa-solid fa-graduation-cap；不確定請找工程師",
        }
      - { name: name, label: 服務名稱, widget: string }
      - { name: short, label: 一句話短說明, widget: string }
      - { name: desc, label: 完整說明, widget: text }
      - {
          name: points,
          label: 重點清單,
          widget: list,
          hint: "至少一個；逐項輸入",
        }
      - name: cta
        label: 按鈕
        widget: list
        label_singular: 按鈕
        summary: "{{label}}"
        fields:
          - { name: label, label: 按鈕文字, widget: string }
          - {
              name: href,
              label: 連結,
              widget: string,
              hint: "站內用 /courses，外部用完整網址",
            }
          - {
              name: primary,
              label: 主要按鈕（深色）,
              widget: boolean,
              required: false,
              default: false,
            }
          - {
              name: external,
              label: 外部連結（另開分頁）,
              widget: boolean,
              required: false,
              default: false,
            }

  - name: news
    label: 最新消息
    label_singular: 消息
    folder: src/data/news
    format: json
    extension: json
    identifier_field: id
    slug: "{{fields.id}}"
    create: true
    delete: true
    summary: "{{date}} · {{title}}"
    fields:
      - {
          name: id,
          label: 代號 (id),
          widget: string,
          hint: "建議用該則日期，例如 2026-01-31；不可重複，會成為檔名",
        }
      - { name: tag, label: 標籤（會變成可篩選分類）, widget: string }
      - name: date
        label: 日期
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        picker_utc: true
        hint: "網站依日期由新到舊排序"
      - {
          name: img,
          label: 圖片檔名,
          widget: string,
          hint: "只填檔名（例如 260131.webp）。先用上方「媒體庫」上傳圖片到 assets/news，再把檔名填這裡",
        }
      - { name: title, label: 標題, widget: string }
      - { name: desc, label: 內容說明, widget: text }
      - {
          name: url,
          label: 連結網址,
          widget: string,
          required: false,
          hint: "原始貼文網址（例如該則 Facebook 貼文）。點擊卡片會開啟站內彈出卡顯示完整內容；有填網址時彈出卡內會多一個「前往 Facebook 原文」按鈕，留空則只顯示站內內容",
        }

  - name: testimonials
    label: 學員見證
    label_singular: 見證
    folder: src/data/testimonials
    format: json
    extension: json
    identifier_field: id
    slug: "{{fields.id}}"
    create: true
    delete: true
    summary: "{{order}} · {{who}}"
    fields:
      - {
          name: id,
          label: 代號 (id),
          widget: string,
          hint: "唯一代號，例如 t7；不可重複，會成為檔名",
        }
      - {
          name: order,
          label: 顯示順序（小的排前面）,
          widget: number,
          value_type: int,
          min: 0,
        }
      - { name: q, label: 見證內容, widget: text }
      - { name: who, label: 身分, widget: string, hint: "例如 軟體工程師" }
      - {
          name: icon,
          label: 圖示 (Font Awesome),
          widget: string,
          hint: "一般不用改；不確定請找工程師",
        }

  - name: faq
    label: 常見問題
    label_singular: 問答
    folder: src/data/faq
    format: json
    extension: json
    identifier_field: id
    slug: "{{fields.id}}"
    create: true
    delete: true
    summary: "{{order}} · {{q}}"
    fields:
      - {
          name: id,
          label: 代號 (id),
          widget: string,
          hint: "唯一代號，例如 f4；不可重複，會成為檔名",
        }
      - {
          name: order,
          label: 顯示順序（小的排前面）,
          widget: number,
          value_type: int,
          min: 0,
        }
      - { name: q, label: 問題, widget: string }
      - { name: a, label: 回答, widget: text }
