name: CI

# Runs on every pull request so reviewers can see type-check, build and
# Playwright results from the GitHub status checks (deploy stays separate).
# Also runs on pushes to `content` (the branch the CMS commits to) so partner
# edits get the SAME full gate; that run attaches to the commit and surfaces as
# the auto-opened content -> main PR's checks (see auto-pr.yml).
on:
  pull_request:
  push:
    branches: [content]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # 與 mise.toml 的 exact pin 對齊（環境 single source of truth）；
          # bump Node 時兩處同步修改。
          node-version: 24.15.0
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Audit content
        run: npm run audit:content
      - name: Type-check
        run: npm run check
      - name: Build
        run: npm run build
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: E2E tests
        # 直接呼叫 playwright：browser 已於前一步含 OS deps 安裝完成。
        # （本機便利指令 `npm run test:e2e` 仍會自行安裝 chromium。）
        run: npx playwright test
