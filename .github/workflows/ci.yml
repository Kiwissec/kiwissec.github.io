name: CI

# Runs on every pull request so reviewers can see type-check, build and
# Playwright results from the GitHub status checks (deploy stays separate).
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Audit content
        run: npm run audit:content
      - name: Type-check
        run: npm run check
      - name: Build
        run: npm run build
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: E2E tests
        run: npm run test:e2e
