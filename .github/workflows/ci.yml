name: CI

# Runs on every pull request so reviewers can see type-check, build and
# Playwright results from the GitHub status checks (deploy stays separate).
# Also runs on pushes to `content` (the branch the CMS commits to) so partner
# edits get the SAME full gate; that run attaches to the commit and surfaces as
# the auto-opened content -> main PR's checks (see auto-pr.yml).
on:
  pull_request:
  push:
    branches: [content]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Audit content
        run: npm run audit:content
      - name: Type-check
        run: npm run check
      - name: Build
        run: npm run build
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: E2E tests
        run: npm run test:e2e
