name: CI

# Runs on every pull request so reviewers can see type-check, build and
# Playwright results from the GitHub status checks (deploy stays separate).
# Also runs on pushes to `content` (the branch the CMS commits to) so partner
# edits get the SAME full gate; that run attaches to the commit and surfaces as
# the auto-opened content -> main PR's checks (see auto-pr.yml).
on:
  pull_request:
  push:
    branches: [content]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          # 與 mise.toml 的 exact pin 對齊（環境 single source of truth）；
          # bump Node 時兩處同步修改。
          node-version: 24.15.0
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Audit dependencies
        # CLAUDE.md 資安要求：CI 自動掃描已知漏洞。--omit=dev 聚焦會出貨的
        # production 依賴；--audit-level=high 避免低風險 advisory 阻塞
        # 內容 PR（dev 依賴與低風險項由 Dependabot 週期 PR 跟進）。
        run: npm audit --omit=dev --audit-level=high
      - name: Audit content
        run: npm run audit:content
      - name: Type-check
        run: npm run check
      - name: Build
        run: npm run build
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: E2E tests
        # 直接呼叫 playwright：browser 已於前一步含 OS deps 安裝完成。
        # （本機便利指令 `npm run test:e2e` 仍會自行安裝 chromium。）
        run: npx playwright test
      - name: Upload Playwright report
        # 失敗時沒有 artifact 就只剩純文字 log；html 報告含 retry 錄到的
        # trace。!cancelled() 確保失敗也上傳（Playwright 官方 CI 建議）。
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
